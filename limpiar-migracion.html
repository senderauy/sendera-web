<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Limpiar migración</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; }
    button { padding: 14px 28px; background: #c0392b; color: #fff; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; }
    #log { margin-top: 20px; font-size: 0.85rem; color: #333; white-space: pre-line; background: #f5f5f5; padding: 16px; border-radius: 8px; }
  </style>
</head>
<body>
<h2>Limpiar productos migrados</h2>
<p>Elimina los productos que subió la migración (los que tienen stockId). La cuellera no se toca.</p>
<button onclick="limpiar()">Eliminar productos migrados</button>
<div id="log">Esperando...</div>
<script>
async function limpiar() {
  const log = document.getElementById('log');
  log.textContent = 'Buscando productos migrados...\n';
  const snap = await db.ref('productos').once('value');
  let eliminados = 0;
  const promesas = [];
  snap.forEach(child => {
    const prod = child.val();
    const tieneStockId = (prod.variantes || []).some(v => v.stockId);
    if (tieneStockId) {
      promesas.push(db.ref('productos/' + child.key).remove().then(() => {
        log.textContent += `🗑️ Eliminado: ${prod.nombre}\n`;
        eliminados++;
      }));
    }
  });
  await Promise.all(promesas);
  log.textContent += `\n✅ Listo! Se eliminaron ${eliminados} productos. Podés cerrar esta página.`;
}
</script>
</body>
</html>
