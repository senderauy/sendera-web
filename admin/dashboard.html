<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="apple-touch-icon" href="../img/logo.png" />
  <link rel="icon" type="image/png" href="../img/logo.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Sendera Admin" />
  <meta name="theme-color" content="#f2ede6" />
  <title>Sendera - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #f2ede6;
      color: #3a3026;
      min-height: 100vh;
    }

    /* NAVBAR */
    .navbar {
      background: #fff;
      border-bottom: 2px solid #e8dfd2;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      height: 60px;
      box-shadow: 0 2px 8px rgba(80,60,30,0.06);
    }

    .navbar .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      color: #3a3026;
      letter-spacing: 0.12em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-links { display: flex; align-items: center; gap: 4px; }

    .nav-links a {
      color: #7a6e62;
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 8px;
      transition: all 0.2s;
      font-weight: 500;
    }

    .nav-links a:hover { background: #f2ede6; color: #3a3026; }
    .nav-links a.active { background: #507a3a; color: #fff; }

    .btn-logout {
      font-size: 0.72rem;
      color: #9a8f82;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: none;
      border: 1px solid #ddd5c8;
      border-radius: 8px;
      padding: 7px 14px;
      margin-left: 8px;
      transition: all 0.2s;
    }
    .btn-logout:hover { background: #f2ede6; color: #3a3026; }
    .btn-logout-top { display: none; background: none; border: none; cursor: pointer; font-size: 1rem; color: #9a8f82; padding: 2px 6px; margin-left: 6px; vertical-align: middle; transition: color 0.2s; }
    .btn-logout-top:hover { color: #3a3026; }

    /* MOBILE NAV */
    .mobile-nav {
      display: none;
      background: #fff;
      border-top: 2px solid #e8dfd2;
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      z-index: 10;
      padding: 8px 0 12px;
    }

    .mobile-nav-links {
      display: flex;
      justify-content: space-around;
    }

    .mobile-nav-links a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      text-decoration: none;
      color: #9a8f82;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: 10px;
      transition: all 0.2s;
    }

    .mobile-nav-links a .icon { font-size: 1.3rem; }
    .mobile-nav-links a.active { color: #507a3a; }
    .mobile-nav-links a.active .icon { transform: scale(1.1); }

    /* CONTAINER */
    .container { max-width: 960px; margin: 0 auto; padding: 28px 20px 80px; }

    /* HEADER */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .page-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: #3a3026;
    }

    .page-header p {
      color: #9a8f82;
      font-size: 0.78rem;
      margin-top: 3px;
      text-transform: capitalize;
    }

    .badge-live {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #edf7e8;
      border: 1px solid #b8dba8;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.68rem;
      color: #507a3a;
      font-weight: 600;
      letter-spacing: 0.06em;
    }

    .dot-live {
      width: 7px; height: 7px;
      background: #507a3a;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* SECCIÓN */
    .seccion-titulo {
      font-size: 0.7rem;
      color: #9a8f82;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8dfd2;
      margin: 32px 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* CARDS MÉTRICAS */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 22px 18px;
      text-align: center;
      border: 1.5px solid #e8dfd2;
      box-shadow: 0 2px 8px rgba(80,60,30,0.05);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(80,60,30,0.1); }

    .card .icon { font-size: 1.6rem; margin-bottom: 8px; }
    .card .num { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: #3a3026; line-height: 1; }
    .card .num.verde { color: #507a3a; }
    .card .num.naranja { color: #c2692b; }
    .card .lbl { font-size: 0.68rem; color: #9a8f82; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 6px; }

    /* RANKING */
    .ranking-wrap {
      background: #fff;
      border-radius: 14px;
      border: 1.5px solid #e8dfd2;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(80,60,30,0.05);
    }

    .ranking-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid #f0ebe3;
      transition: background 0.15s;
    }

    .ranking-item:last-child { border-bottom: none; }
    .ranking-item:hover { background: #faf8f4; }

    .ranking-pos {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      color: #ddd5c8;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }

    .ranking-item:nth-child(1) .ranking-pos { color: #c2692b; }
    .ranking-item:nth-child(2) .ranking-pos { color: #9a8f82; }
    .ranking-item:nth-child(3) .ranking-pos { color: #a07d45; }

    .ranking-nombre { flex: 1; font-size: 0.85rem; color: #3a3026; font-weight: 500; }
    .ranking-qty {
      font-size: 0.8rem;
      color: #507a3a;
      font-weight: 600;
      background: #edf7e8;
      border-radius: 20px;
      padding: 3px 10px;
    }

    /* ALERTAS */
    .alerta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      margin-bottom: 10px;
      border-radius: 12px;
      border-left: 4px solid;
      gap: 12px;
    }

    .alerta.bajo { background: #fff5f5; border-color: #e74c3c; }
    .alerta.medio { background: #fffbeb; border-color: #c2692b; }

    .alerta-nombre { font-size: 0.85rem; color: #3a3026; font-weight: 500; }
    .alerta-variante { font-size: 0.75rem; color: #9a8f82; margin-top: 2px; }

    .alerta-stock {
      font-size: 0.82rem;
      font-weight: 700;
      border-radius: 20px;
      padding: 4px 12px;
      white-space: nowrap;
    }

    .alerta.bajo .alerta-stock { color: #b91c1c; background: #fee2e2; }
    .alerta.medio .alerta-stock { color: #92400e; background: #fef3c7; }

    .empty {
      text-align: center;
      padding: 28px;
      color: #9a8f82;
      font-size: 0.82rem;
      background: #fff;
      border-radius: 14px;
      border: 1.5px solid #e8dfd2;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
      .nav-links, .btn-logout { display: none; }
      .btn-logout-top { display: inline-block; }
      .mobile-nav { display: block; }
      .container { padding-bottom: 90px; }
      .page-header h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<div class="navbar">
  <div class="logo">SENDERA <button class="btn-logout-top" onclick="logout()" title="Salir">↩</button></div>
  <div class="nav-links">
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="pedidos.html">Pedidos</a>
    <a href="productos.html">Productos</a>
    <a href="stock.html">Stock</a>
    <a href="https://analytics.google.com" target="_blank">Analytics</a>
    <button class="btn-logout" onclick="logout()">↩ Salir</button>
  </div>
</div>

<div class="container">
  <div class="page-header">
    <div>
      <h1>Dashboard 🌿</h1>
      <p id="fecha-hoy"></p>
    </div>
    <div class="badge-live"><div class="dot-live"></div> En vivo</div>
  </div>

  <div class="seccion-titulo">💰 Caja</div>
  <div class="cards">
    <div class="card">
      <div class="icon">📈</div>
      <div class="num verde" id="caja-hoy">$0</div>
      <div class="lbl">Vendido hoy</div>
    </div>
    <div class="card">
      <div class="icon">🗓️</div>
      <div class="num" id="caja-mes">$0</div>
      <div class="lbl">Este mes</div>
    </div>
    <div class="card">
      <div class="icon">🛍️</div>
      <div class="num" id="pedidos-hoy">0</div>
      <div class="lbl">Pedidos hoy</div>
    </div>
    <div class="card">
      <div class="icon">⏳</div>
      <div class="num naranja" id="pedidos-pendientes">0</div>
      <div class="lbl">Pendientes</div>
    </div>
  </div>

  <div class="seccion-titulo">🏆 Más vendidos</div>
  <div id="ranking-lista"><div class="empty">Sin pedidos todavía</div></div>

  <div class="seccion-titulo">⚠️ Alertas de stock</div>
  <div id="alertas-lista"><div class="empty">✅ Todo el stock en orden</div></div>
</div>

<!-- Mobile nav -->
<div class="mobile-nav">
  <div class="mobile-nav-links">
    <a href="dashboard.html" class="active"><span class="icon">📊</span>Dashboard</a>
    <a href="pedidos.html"><span class="icon">📦</span>Pedidos</a>
    <a href="productos.html"><span class="icon">🛍️</span>Productos</a>
    <a href="stock.html"><span class="icon">🏷️</span>Stock</a>
    <a href="https://analytics.google.com" target="_blank"><span class="icon">📈</span>Analytics</a>
    <a href="#" onclick="logout()"><span class="icon">↩️</span>Salir</a>
  </div>
</div>

<script>
  if (!localStorage.getItem('sendera_admin')) window.location.href = 'login.html';
  function logout() { localStorage.removeItem('sendera_admin'); window.location.href = 'login.html'; }

  const hoy = new Date();
  document.getElementById('fecha-hoy').textContent = hoy.toLocaleDateString('es-UY', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  const CATALOGO = [
    { id: 'gom-blanco', nombre: 'Go One More', variante: 'Blanco' },
    { id: 'gom-rosa', nombre: 'Go One More', variante: 'Rosa' },
    { id: 'gom-verde', nombre: 'Go One More', variante: 'Verde' },
    { id: 'gom-violeta', nombre: 'Go One More', variante: 'Violeta' },
    { id: 'trail-azul', nombre: 'Trail Cap', variante: 'Azul' },
    { id: 'trail-negro', nombre: 'Trail Cap', variante: 'Negro' },
    { id: 'sunset-amarillo', nombre: 'Sunset Flower', variante: 'Rojo/Amarillo' },
    { id: 'sunset-verde', nombre: 'Sunset Flower', variante: 'Gris/Verde' },
    { id: 'lana-negro', nombre: 'Gorro Lana Montaña', variante: 'Negro' },
    { id: 'lana-azul', nombre: 'Gorro Lana Montaña', variante: 'Azul' },
    { id: 'lana-rosa', nombre: 'Gorro Lana Montaña', variante: 'Rosa' },
    { id: 'rinonera-sendera', nombre: 'Riñonera Sendera', variante: 'Verde' },
    { id: 'rinonera-celeste', nombre: 'Riñonera Running', variante: 'Celeste' },
    { id: 'rinonera-negra', nombre: 'Riñonera Running', variante: 'Negra' },
    { id: 'medallero', nombre: 'Medallero RUN', variante: 'Negro' },
    { id: 'porta-celular', nombre: 'Porta Celular', variante: 'Negro' },
  ];

  db.ref('pedidos').on('value', snapshot => {
    const pedidos = [];
    snapshot.forEach(c => { pedidos.push({ id: c.key, ...c.val() }); });

    const hoyStr = new Date().toDateString();
    const mesActual = new Date().getMonth();
    const anioActual = new Date().getFullYear();

    let cajaHoy = 0, cajaMes = 0, pedidosHoy = 0, pendientes = 0;
    const ventas = {};

    pedidos.forEach(p => {
      const fecha = new Date(p.fecha);
      if (fecha.toDateString() === hoyStr) { cajaHoy += p.total; pedidosHoy++; }
      if (fecha.getMonth() === mesActual && fecha.getFullYear() === anioActual) cajaMes += p.total;
      if (p.estado === 'pendiente') pendientes++;
      if (p.productos) {
        p.productos.forEach(pr => {
          const key = pr.nombre + ' · ' + pr.variante;
          ventas[key] = (ventas[key] || 0) + pr.qty;
        });
      }
    });

    document.getElementById('caja-hoy').textContent = '$' + cajaHoy.toLocaleString();
    document.getElementById('caja-mes').textContent = '$' + cajaMes.toLocaleString();
    document.getElementById('pedidos-hoy').textContent = pedidosHoy;
    document.getElementById('pedidos-pendientes').textContent = pendientes;

    const ranking = Object.entries(ventas).sort((a, b) => b[1] - a[1]).slice(0, 5);
    const rankingEl = document.getElementById('ranking-lista');
    rankingEl.innerHTML = ranking.length === 0
      ? '<div class="empty">Sin pedidos todavía 🏕️</div>'
      : `<div class="ranking-wrap">${ranking.map(([nombre, qty], i) => `
          <div class="ranking-item">
            <div class="ranking-pos">${i + 1}</div>
            <div class="ranking-nombre">${nombre}</div>
            <div class="ranking-qty">${qty} uds</div>
          </div>`).join('')}</div>`;
  });

  db.ref('stock').on('value', snapshot => {
    const stock = snapshot.val() || {};
    const alertas = CATALOGO.filter(p => (stock[p.id] !== undefined ? stock[p.id] : 5) <= 3);
    const alertasEl = document.getElementById('alertas-lista');
    alertasEl.innerHTML = alertas.length === 0
      ? '<div class="empty">✅ Todo el stock en orden</div>'
      : alertas.map(p => {
          const s = stock[p.id] !== undefined ? stock[p.id] : 0;
          return `<div class="alerta ${s === 0 ? 'bajo' : 'medio'}">
            <div>
              <div class="alerta-nombre">${p.nombre}</div>
              <div class="alerta-variante">${p.variante}</div>
            </div>
            <div class="alerta-stock">${s === 0 ? '❌ Sin stock' : '⚠️ ' + s + ' uds'}</div>
          </div>`;
        }).join('');
  });
</script>
</body>
</html>
