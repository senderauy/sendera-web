<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sendera - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #1e1a17; color: #f0ebe3; }

    .navbar {
      background: #141210;
      border-bottom: 1px solid rgba(201,176,122,0.15);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .navbar .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: #c9b07a; letter-spacing: 0.1em; }
    .nav-links a { color: #a89880; text-decoration: none; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; margin-left: 20px; }
    .nav-links a.active, .nav-links a:hover { color: #c9b07a; }
    .btn-logout { font-size: 0.72rem; color: #a89880; cursor: pointer; margin-left: 20px; text-transform: uppercase; letter-spacing: 0.08em; background: none; border: none; }

    .container { max-width: 960px; margin: 0 auto; padding: 32px 20px; }

    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: #c9b07a; }
    .page-header p { color: #a89880; font-size: 0.8rem; margin-top: 4px; text-transform: capitalize; }

    .seccion-titulo {
      font-size: 0.72rem; color: #c9b07a; letter-spacing: 0.18em; text-transform: uppercase;
      font-weight: 500; padding-bottom: 10px; border-bottom: 1px solid rgba(201,176,122,0.15);
      margin: 36px 0 16px;
    }

    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(201,176,122,0.12); padding: 20px 16px; text-align: center; }
    .card .num { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: #c9b07a; }
    .card .num.verde { color: #2ecc71; }
    .card .num.naranja { color: #f39c12; }
    .card .lbl { font-size: 0.68rem; color: #a89880; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

    .ranking-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .ranking-item:last-child { border-bottom: none; }
    .ranking-pos { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: rgba(201,176,122,0.3); width: 32px; }
    .ranking-nombre { flex: 1; font-size: 0.85rem; color: #f0ebe3; }
    .ranking-qty { font-size: 0.85rem; color: #c9b07a; font-weight: 500; }

    .alerta { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; margin-bottom: 8px; border-left: 3px solid; }
    .alerta.bajo { background: rgba(231,76,60,0.08); border-color: #e74c3c; }
    .alerta.medio { background: rgba(243,156,18,0.08); border-color: #f39c12; }
    .alerta-nombre { font-size: 0.85rem; color: #f0ebe3; }
    .alerta-variante { font-size: 0.75rem; color: #a89880; }
    .alerta-stock { font-size: 0.85rem; font-weight: 600; }
    .alerta.bajo .alerta-stock { color: #e74c3c; }
    .alerta.medio .alerta-stock { color: #f39c12; }

    .empty { text-align: center; padding: 24px; color: #a89880; font-size: 0.82rem; }

    @media (max-width: 480px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

<div class="navbar">
  <div class="logo">SENDERA admin</div>
  <div class="nav-links">
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="pedidos.html">Pedidos</a>
    <a href="stock.html">Stock</a>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</div>

<div class="container">
  <div class="page-header">
    <h1>Dashboard</h1>
    <p id="fecha-hoy"></p>
  </div>

  <div class="seccion-titulo">💰 Caja</div>
  <div class="cards">
    <div class="card"><div class="num verde" id="caja-hoy">$0</div><div class="lbl">Vendido hoy</div></div>
    <div class="card"><div class="num" id="caja-mes">$0</div><div class="lbl">Este mes</div></div>
    <div class="card"><div class="num" id="pedidos-hoy">0</div><div class="lbl">Pedidos hoy</div></div>
    <div class="card"><div class="num naranja" id="pedidos-pendientes">0</div><div class="lbl">Pendientes</div></div>
  </div>

  <div class="seccion-titulo">📊 Más vendidos</div>
  <div id="ranking-lista"><div class="empty">Sin pedidos todavía</div></div>

  <div class="seccion-titulo">🔔 Alertas de stock</div>
  <div id="alertas-lista"><div class="empty">Todo el stock en orden ✓</div></div>
</div>

<script>
  if (!localStorage.getItem('sendera_admin')) window.location.href = 'login.html';
  function logout() { localStorage.removeItem('sendera_admin'); window.location.href = 'login.html'; }

  const hoy = new Date();
  document.getElementById('fecha-hoy').textContent = hoy.toLocaleDateString('es-UY', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  const CATALOGO = [
    { id: 'gom-blanco', nombre: 'Go One More', variante: 'Blanco' },
    { id: 'gom-rosa', nombre: 'Go One More', variante: 'Rosa' },
    { id: 'gom-verde', nombre: 'Go One More', variante: 'Verde' },
    { id: 'gom-violeta', nombre: 'Go One More', variante: 'Violeta' },
    { id: 'trail-azul', nombre: 'Trail Cap', variante: 'Azul' },
    { id: 'trail-negro', nombre: 'Trail Cap', variante: 'Negro' },
    { id: 'sunset-amarillo', nombre: 'Sunset Flower', variante: 'Rojo/Amarillo' },
    { id: 'sunset-verde', nombre: 'Sunset Flower', variante: 'Gris/Verde' },
    { id: 'lana-negro', nombre: 'Gorro Lana Montaña', variante: 'Negro' },
    { id: 'lana-azul', nombre: 'Gorro Lana Montaña', variante: 'Azul' },
    { id: 'lana-rosa', nombre: 'Gorro Lana Montaña', variante: 'Rosa' },
    { id: 'rinonera-sendera', nombre: 'Riñonera Sendera', variante: 'Verde' },
    { id: 'rinonera-celeste', nombre: 'Riñonera Running', variante: 'Celeste' },
    { id: 'rinonera-negra', nombre: 'Riñonera Running', variante: 'Negra' },
    { id: 'medallero', nombre: 'Medallero RUN', variante: 'Negro' },
    { id: 'porta-celular', nombre: 'Porta Celular', variante: 'Negro' },
  ];

  db.ref('pedidos').on('value', snapshot => {
    const pedidos = [];
    snapshot.forEach(c => pedidos.push({ id: c.key, ...c.val() }));

    const hoyStr = new Date().toDateString();
    const mesActual = new Date().getMonth();
    const anioActual = new Date().getFullYear();

    let cajaHoy = 0, cajaMes = 0, pedidosHoy = 0, pendientes = 0;
    const ventas = {};

    pedidos.forEach(p => {
      const fecha = new Date(p.fecha);
      if (fecha.toDateString() === hoyStr) { cajaHoy += p.total; pedidosHoy++; }
      if (fecha.getMonth() === mesActual && fecha.getFullYear() === anioActual) cajaMes += p.total;
      if (p.estado === 'pendiente') pendientes++;
      if (p.productos) {
        p.productos.forEach(pr => {
          const key = pr.nombre + ' · ' + pr.variante;
          ventas[key] = (ventas[key] || 0) + pr.qty;
        });
      }
    });

    document.getElementById('caja-hoy').textContent = '$' + cajaHoy.toLocaleString();
    document.getElementById('caja-mes').textContent = '$' + cajaMes.toLocaleString();
    document.getElementById('pedidos-hoy').textContent = pedidosHoy;
    document.getElementById('pedidos-pendientes').textContent = pendientes;

    const ranking = Object.entries(ventas).sort((a, b) => b[1] - a[1]).slice(0, 5);
    const rankingEl = document.getElementById('ranking-lista');
    rankingEl.innerHTML = ranking.length === 0
      ? '<div class="empty">Sin pedidos todavía</div>'
      : ranking.map(([nombre, qty], i) => `
          <div class="ranking-item">
            <div class="ranking-pos">${i + 1}</div>
            <div class="ranking-nombre">${nombre}</div>
            <div class="ranking-qty">${qty} uds</div>
          </div>`).join('');
  });

  db.ref('stock').on('value', snapshot => {
    const stock = snapshot.val() || {};
    const alertas = CATALOGO.filter(p => (stock[p.id] !== undefined ? stock[p.id] : 5) <= 3);
    const alertasEl = document.getElementById('alertas-lista');
    alertasEl.innerHTML = alertas.length === 0
      ? '<div class="empty">Todo el stock en orden ✓</div>'
      : alertas.map(p => {
          const s = stock[p.id] !== undefined ? stock[p.id] : 0;
          return `<div class="alerta ${s === 0 ? 'bajo' : 'medio'}">
            <div>
              <div class="alerta-nombre">${p.nombre}</div>
              <div class="alerta-variante">${p.variante}</div>
            </div>
            <div class="alerta-stock">${s === 0 ? 'Sin stock' : s + ' uds'}</div>
          </div>`;
        }).join('');
  });
</script>
</body>
</html>
