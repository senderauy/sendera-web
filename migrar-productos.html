async function migrar() {
  const log = document.getElementById('log');
  log.textContent = 'Iniciando migración...\n';

  for (const prod of productos) {
    try {
      const ref = db.ref('productos').push();
      await ref.set(prod);
      log.textContent += `✅ ${prod.nombre} (${prod.variantes.length} variantes)\n`;
    } catch(e) {
      log.textContent += `❌ Error en ${prod.nombre}: ${e.message}\n`;

  log.textContent += '\n🎉 Migración completada! Podés cerrar esta página.';
